# Unique key for this project in SonarQube dashboard
sonar.projectKey=webapp

# Display name in SonarQube UI
sonar.projectName=WebApp

# Where is your source code? (use . for root)
sonar.sources=.

# Ignore these folders (not your actual code)
sonar.exclusions=**/node_modules/**,**/.git/**,**/dist/**,**/build/**
